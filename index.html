<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Classificador</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            min-height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
        #webcam-container canvas {
            border-radius: 10px;
            border: 4px solid #0d6efd;
        }
        .progress {
            height: 25px;
        }
        .btn-camera {
            font-size: 1.2rem;
            padding: 12px 25px;
            border-radius: 50px;
        }
    </style>
</head>
<body>

<div class="container py-5 text-center">
    <h1 class="mb-3">Site SEU NOME</h1>
    <p class="lead mb-4">Teachable Machine Image Model</p>

    <button class="btn btn-lg btn-success btn-camera shadow" onclick="init()">
        🎥 Permitir Câmera
    </button>

    <div class="row justify-content-center mt-5">
        <div class="col-md-4 text-center">
            <div id="webcam-container" class="mb-3"></div>
        </div>

        <div class="col-md-6">
            <div class="card p-4 shadow text-dark">
                <h5 class="mb-3 text-center">Resultados</h5>
                <div id="label-container"></div>
            </div>
        </div>
    </div>
</div>

<!-- TensorFlow e Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/B1pUBdlok/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(250, 250, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            const wrapper = document.createElement("div");
            wrapper.classList.add("mb-3");

            wrapper.innerHTML = `
                <div class="d-flex justify-content-between">
                    <span id="label-${i}">Classe</span>
                    <span id="value-${i}">0%</span>
                </div>
                <div class="progress">
                    <div id="bar-${i}" class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                        role="progressbar" style="width: 0%">
                    </div>
                </div>
            `;

            labelContainer.appendChild(wrapper);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        for (let i = 0; i < maxPredictions; i++) {
            const probability = (prediction[i].probability * 100).toFixed(1);

            document.getElementById(`label-${i}`).innerText = prediction[i].className;
            document.getElementById(`value-${i}`).innerText = probability + "%";

            const bar = document.getElementById(`bar-${i}`);
            bar.style.width = probability + "%";

            // muda cor dinamicamente
            bar.classList.remove("bg-success", "bg-warning", "bg-danger");

            if (probability > 70) {
                bar.classList.add("bg-success");
            } else if (probability > 40) {
                bar.classList.add("bg-warning");
            } else {
                bar.classList.add("bg-danger");
            }
        }
    }
</script>
</body>
</html>
